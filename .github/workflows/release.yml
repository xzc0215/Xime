name: Build and Release APK

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
- name: Install NDK
        run: |
          sdkmanager "ndk;28.2.13676358"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV
          echo "ANDROID_NDK=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV
          
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build
          
      - name: Cache sherpa-onnx build
        uses: actions/cache@v4
        with:
          path: |
            build/sherpa-onnx-*
            app/src/main/jniLibs/arm64-v8a/libsherpa-onnx-jni.so
            app/src/main/jniLibs/armeabi-v7a/libsherpa-onnx-jni.so
          key: sherpa-${{ runner.os }}-1.13.0-${{ hashFiles('build-sherpa-onnx.sh') }}
          restore-keys: |
            sherpa-${{ runner.os }}-
            
      - name: Download ONNX Runtime and build sherpa-onnx
        run: ./gradlew downloadOnnx buildSherpaOnnx --no-daemon
        
      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: |
            app/.cxx
            app/src/main/jni/boost
            app/src/main/jni/boost-*.tar.xz
          key: cmake-${{ runner.os }}-${{ hashFiles('app/src/main/jni/CMakeLists.txt') }}
          restore-keys: |
            cmake-${{ runner.os }}-
            
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Build Release APKs (Unsigned)
        run: ./gradlew assembleRelease --no-daemon
        
      - name: Sign Main App APKs
        uses: r0adkll/sign-android-release@v1
        id: sign_main_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"
          
      - name: Sign Meme Bunny Plugin APKs
        uses: r0adkll/sign-android-release@v1
        id: sign_emoji_plugin
        with:
          releaseDirectory: plugins/meme-bunny/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"
          
      - name: Sign Kaomoji Plugin APKs
        uses: r0adkll/sign-android-release@v1
        id: sign_kaomoji_plugin
        with:
          releaseDirectory: plugins/kaomoji/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"
        
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        
      - name: Find signed APKs
        id: find_apks
        run: |
          MAIN_APKS=$(find app/build/outputs/apk/release -name "*-signed.apk" -type f | sort | tr '\n' ',' | sed 's/,$//')
          MEME_BUNNY_APKS=$(find plugins/meme-bunny/build/outputs/apk/release -name "*-signed.apk" -type f | sort | tr '\n' ',' | sed 's/,$//')
          KAOMOJI_APKS=$(find plugins/kaomoji/build/outputs/apk/release -name "*-signed.apk" -type f | sort | tr '\n' ',' | sed 's/,$//')
          
          echo "main_apks=$MAIN_APKS" >> $GITHUB_OUTPUT
          echo "meme_bunny_apks=$MEME_BUNNY_APKS" >> $GITHUB_OUTPUT
          echo "kaomoji_apks=$KAOMOJI_APKS" >> $GITHUB_OUTPUT
          
          echo "Main App APKs:"
          echo "$MAIN_APKS" | tr ',' '\n'
          echo "Meme Bunny Plugin APKs:"
          echo "$MEME_BUNNY_APKS" | tr ',' '\n'
          echo "Kaomoji Plugin APKs:"
          echo "$KAOMOJI_APKS" | tr ',' '\n'
          
          if [ -z "$MAIN_APKS" ]; then
            echo "::warning::No main app APKs found!"
            ls -la app/build/outputs/apk/release/
          fi
        
      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log $PREVIOUS_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Xime ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Xime ${{ steps.get_version.outputs.VERSION }}
            
            ### 主程序下载
            选择对应架构的APK：
            - **arm64-v8a**: 适用于大多数现代手机
            - **armeabi-v7a**: 适用于旧款32位手机
            - **x86_64**: 适用于模拟器
            - **universal**: 包含所有架构，体积较大
            
            ### 插件下载（可选）
            插件为独立 APK，安装后可在主应用中启用：
            - **meme-bunny**: 恶搞兔表情包插件（提供8个表情）
            - **kaomoji**: 颜文字插件（提供精选颜文字）
            
            ### 安装说明
            ${{ steps.changelog.outputs.CHANGELOG }}
          files: |
            ${{ steps.find_apks.outputs.main_apks }}
            ${{ steps.find_apks.outputs.meme_bunny_apks }}
            ${{ steps.find_apks.outputs.kaomoji_apks }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}