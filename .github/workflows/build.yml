name: Build and Test APK

on:
  push:
    branches:
      - main
      - dev*
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Install NDK
        run: |
          sdkmanager "ndk;28.2.13676358"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV
          echo "ANDROID_NDK=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV
        
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build
          
      - name: Cache sherpa-onnx build
        uses: actions/cache@v4
        with:
          path: |
            build/sherpa-onnx-*
            app/src/main/jniLibs/arm64-v8a/libsherpa-onnx-jni.so
            app/src/main/jniLibs/armeabi-v7a/libsherpa-onnx-jni.so
          key: sherpa-${{ runner.os }}-1.13.0-${{ hashFiles('build-sherpa-onnx.sh') }}
          restore-keys: |
            sherpa-${{ runner.os }}-
            
      - name: Download ONNX Runtime and build sherpa-onnx
        run: ./gradlew downloadOnnx buildSherpaOnnx --no-daemon
        
      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: |
            app/.cxx
            app/src/main/jni/boost
            app/src/main/jni/boost-*.tar.xz
          key: cmake-${{ runner.os }}-${{ hashFiles('app/src/main/jni/CMakeLists.txt') }}
          restore-keys: |
            cmake-${{ runner.os }}-
            
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Run Unit Tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon
        
      - name: Generate Test Report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: '**/build/test-results/testDebugUnitTest/*.xml'
          fail_on_failure: true
          
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/test-results/testDebugUnitTest/
          retention-days: 7
          
      - name: Build Debug APKs
        run: ./gradlew assembleDebug --no-daemon
        
      - name: Upload Debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: debug-apks
          path: |
            app/build/outputs/apk/debug/*.apk
            plugins/*/build/outputs/apk/debug/*.apk
          retention-days: 7